<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EcoMirror Receiver</title>

<!-- Chromecast CAF -->
<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

<!-- MPEGTS -->
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video {
    width:100%;
    height:100%;
    background:#000;
}
</style>
</head>

<body>

<video id="tvPlayer" autoplay muted playsinline></video>

<script>

const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();

let mpegtsPlayer = null;
const videoElement = document.getElementById("tvPlayer");


/* =========================
   Cleanup player
========================= */

function destroyPlayer(){

    if(!mpegtsPlayer) return;

    try{

        mpegtsPlayer.pause();

        mpegtsPlayer.unload();

        mpegtsPlayer.detachMediaElement();

        mpegtsPlayer.destroy();

    }catch(e){

        console.log("cleanup error",e);

    }

    mpegtsPlayer = null;
}


/* =========================
   Start TS player
========================= */

function startTS(streamUrl){

    console.log("Start stream:",streamUrl);

    destroyPlayer();

    if(!mpegts.getFeatureList().mseLivePlayback){

        console.error("MSE live playback not supported");

        return;
    }

    mpegtsPlayer = mpegts.createPlayer(

        {
            type:"mse",
            isLive:true,
            url:streamUrl,
            cors:true
        },

        {
            enableWorker:true,

            enableStashBuffer:true,
            stashInitialSize:384,

            liveBufferLatencyChasing:true,
            liveBufferLatencyMaxLatency:1,
            liveBufferLatencyMinRemain:0.5,

            autoCleanupSourceBuffer:true,
            autoCleanupMaxBackwardDuration:1,
            autoCleanupMinBackwardDuration:0.5,

            lazyLoad:false
        }

    );

    mpegtsPlayer.attachMediaElement(videoElement);

    mpegtsPlayer.load();

    videoElement.play().catch(()=>{});

}


/* =========================
   Chromecast LOAD intercept
========================= */

playerManager.setMessageInterceptor(

    cast.framework.messages.MessageType.LOAD,

    request => {

        const streamUrl = request.media.contentId;

        console.log("LOAD request:",streamUrl);

        startTS(streamUrl);

        return null; // Chromecast default player disabled
    }

);


/* =========================
   Error logging
========================= */

window.addEventListener("error", e=>{
    console.error("JS Error",e);
});


/* =========================
   Start receiver
========================= */

context.start({

    disableIdleTimeout:true

});

</script>

</body>
</html>
